<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品ページ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-sky-50 w-full">
    <header class="bg-sky-600 fixed top-0 left-0 z-50 w-full flex items-center px-6 py-4">
        <h1 class="text-white text-3xl md:text-4xl font-bold ml-3">商品ページ</h1>
        <div class="flex gap-4 ml-auto">
            <p class="text-white font-bold text-sm hover:scale-110 transition">ログイン</p>
            <p class="text-white font-bold text-sm hover:scale-110 transition">注文かご</p>
        </div>
    </header>
    <main class="grid grid-cols-1 md:grid-cols-4 gap-8 p-8 mt-16">
        <div class="bg-white rounded-lg shadow p-4 hover:bg-sky-100 hover:shadow-lg hover:scale-105 transition">
            <div class="text-8xl text-center">👗</div>
            <h2 class="font-bold text-xl">ドレス</h2>
            <p class="text-gray-500 text-sm mt-1">¥15,000</p>
        </div>
        <div class="bg-white rounded-lg shadow p-4 hover:bg-sky-100 hover:shadow-lg hover:scale-105 transition">
            <div class="text-8xl text-center">👕</div>
            <h2 class="font-bold text-xl">Tシャツ</h2>
            <p class="text-gray-500 text-sm mt-1">¥3,000</p>
        </div>
        <div class="bg-white rounded-lg shadow p-4 hover:bg-sky-100 hover:shadow-lg hover:scale-105 transition">
            <div class="text-8xl text-center">👖</div>
            <h2 class="font-bold text-xl">ジーンズ</h2>
            <p class="text-gray-500 text-sm mt-1">¥5,000</p>
        </div>
        <div class="bg-white rounded-lg shadow p-4 hover:bg-sky-100 hover:shadow-lg hover:scale-105 transition">
            <div class="text-8xl text-center">🧥</div>
            <h2 class="font-bold text-xl">ジャケット</h2>
            <p class="text-gray-500 text-sm mt-1">¥10,000</p>
        </div>
        <div class="bg-white rounded-lg shadow p-4 hover:bg-sky-100 hover:shadow-lg hover:scale-105 transition">
            <div class="text-8xl text-center">👟</div>
            <h2 class="font-bold text-xl">スニーカー</h2>
            <p class="text-gray-500 text-sm mt-1">¥8,000</p>
        </div>
        <div class="bg-white rounded-lg shadow p-4 hover:bg-sky-100 hover:shadow-lg hover:scale-105 transition">
            <div class="text-8xl text-center">👜</div>
            <h2 class="font-bold text-xl">バッグ</h2>
            <p class="text-gray-500 text-sm mt-1">¥6,000</p>
        </div>
        <div class="bg-white rounded-lg shadow p-4 hover:bg-sky-100 hover:shadow-lg hover:scale-105 transition">
            <div class="text-8xl text-center">🕶️</div>
            <h2 class="font-bold text-xl">サングラス</h2>
            <p class="text-gray-500 text-sm mt-1">¥4,000</p>
        </div>
        <div class="bg-white rounded-lg shadow p-4 hover:bg-sky-100 hover:shadow-lg hover:scale-105 transition">
            <div class="text-8xl text-center">⌚</div>
            <h2 class="font-bold text-xl">腕時計</h2>
            <p class="text-gray-500 text-sm mt-1">¥20,000</p>
        </div>
    </main>
</body>
</html>
